<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#ff9f43">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="리원수학">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon.svg">
<title>리원이 공부 놀이터 ✨</title>
<style>
  :root{ --c:#ff9f43; --c-dark:#e67e22; --bg:#fff9f0; --ink:#33323a; --soft:#7a7785; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',system-ui,sans-serif;
    background:var(--bg); color:var(--ink); min-height:100vh; line-height:1.55; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:560px; margin:0 auto; padding:16px 16px calc(64px + env(safe-area-inset-bottom));}
  h1,h2,h3{margin:0;}
  button{font-family:inherit; cursor:pointer; border:none;}

  /* 홈 */
  .home-head{text-align:center; padding:10px 0 4px;}
  .home-head .big{font-size:28px; font-weight:900; letter-spacing:-1px;}
  .home-head .sub{color:var(--soft); font-size:14px; margin-top:4px;}
  .topwallet{display:flex; gap:8px; justify-content:center; margin:12px 0 4px; flex-wrap:wrap;}
  .wpill{background:#fff; border:2px solid #eee; border-radius:14px; padding:7px 13px; font-weight:800; font-size:14px; box-shadow:0 3px 8px rgba(0,0,0,.05);}
  .unit-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:14px;}
  .unit-card{border-radius:22px; padding:16px 14px; color:#fff; box-shadow:0 8px 18px rgba(0,0,0,.12);
    text-align:left; transition:transform .12s; min-height:120px; display:flex; flex-direction:column; justify-content:space-between; position:relative;}
  .unit-card:active{transform:scale(.96);}
  .unit-card .emoji{font-size:36px; line-height:1;}
  .unit-card .uname{font-size:19px; font-weight:900; margin-top:6px;}
  .unit-card .usub{font-size:12px; opacity:.92; margin-top:2px; font-weight:600;}
  .unit-card .clr{position:absolute; top:10px; right:12px; font-size:12px; font-weight:800; background:rgba(255,255,255,.25); padding:2px 8px; border-radius:10px;}
  .home-btns{display:flex; gap:10px; margin-top:14px;}
  .home-btns button{flex:1; background:#fff; border:2px solid #eee; border-radius:18px; padding:14px; font-weight:800; font-size:15px; color:var(--ink); box-shadow:0 4px 10px rgba(0,0,0,.06);}
  .credit{text-align:center; color:var(--soft); font-size:12px; margin-top:18px; line-height:1.7;}

  /* 단원 */
  .topbar{display:flex; align-items:center; gap:10px; padding:6px 0 12px;}
  .back{background:#fff; border:2px solid #eee; border-radius:14px; width:46px; height:46px; font-size:20px; font-weight:900; color:var(--c-dark); box-shadow:0 3px 8px rgba(0,0,0,.06); flex:0 0 auto;}
  .topbar .t{font-size:20px; font-weight:900;}
  .topbar .t .e{margin-right:6px;}
  .topbar .spacer{flex:1;}
  .topbar .mini{background:#fff; border:2px solid #eee; border-radius:12px; padding:6px 10px; font-weight:800; font-size:13px;}
  .stages{display:flex; flex-wrap:wrap; gap:7px; margin-bottom:16px;}
  .stage-btn{flex:1 1 28%; min-width:86px; padding:9px 2px; border-radius:14px; font-weight:800; font-size:13px; background:#fff; color:var(--soft); border:2px solid #eee; box-shadow:0 3px 8px rgba(0,0,0,.05);}
  .stage-btn.active{background:var(--c); color:#fff; border-color:var(--c); box-shadow:0 5px 14px rgba(0,0,0,.16);}
  .stage-btn .num{display:block; font-size:10px; opacity:.8; font-weight:700;}

  .card{background:#fff; border-radius:22px; padding:18px 16px; box-shadow:0 6px 16px rgba(0,0,0,.07); margin-bottom:14px;}
  .card h3{font-size:17px; color:var(--c-dark); margin-bottom:8px; display:flex; align-items:center; gap:7px;}
  .card p{margin:0 0 9px; font-size:15px;}
  .card p:last-child{margin-bottom:0;}
  .method-tag{display:inline-block; background:var(--bg); color:var(--c-dark); font-weight:800; font-size:12px; padding:3px 10px; border-radius:10px; margin-bottom:8px;}
  .hl{background:linear-gradient(transparent 55%, color-mix(in srgb, var(--c) 35%, white) 55%); font-weight:800; padding:0 2px;}
  .formula{background:var(--bg); border:2px dashed color-mix(in srgb,var(--c) 50%, white); border-radius:14px; padding:12px 14px; text-align:center; font-size:18px; font-weight:900; color:var(--c-dark); margin:10px 0;}
  .tipbox{background:#fffbe9; border-left:5px solid #ffd84d; border-radius:10px; padding:10px 12px; font-size:14px; margin-top:10px;}
  .tipbox b{color:#c8920a;}

  /* 서브탭(그림게임 종류) */
  .subtabs{display:flex; flex-wrap:wrap; gap:7px; margin-bottom:12px;}
  .subtab{background:#fff; border:2px solid #eee; border-radius:14px; padding:8px 12px; font-weight:800; font-size:13.5px; color:var(--soft); box-shadow:0 3px 8px rgba(0,0,0,.04);}
  .subtab.active{background:var(--c); color:#fff; border-color:var(--c);}

  /* 개념게임 공통 */
  .cg-tip{font-size:15px; font-weight:700; text-align:center; margin:0 0 12px;}
  .cg-tip b{color:var(--c-dark);}
  .ctrl-row{display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-bottom:14px;}
  .ctrl{background:#fff; border:2px solid #eee; border-radius:16px; padding:8px 10px; display:flex; align-items:center; gap:8px; font-weight:800; font-size:14px; box-shadow:0 3px 8px rgba(0,0,0,.05);}
  .ctrl .lbl{color:var(--soft);}
  .stepbtn{width:38px; height:38px; border-radius:12px; background:var(--c); color:#fff; font-size:22px; font-weight:900; line-height:1;}
  .stepbtn:active{transform:scale(.9);}
  .ctrl .val{min-width:26px; text-align:center; font-size:20px; color:var(--c-dark);}
  .cg-eq{text-align:center; font-size:20px; font-weight:900; margin-top:14px; color:var(--ink);}
  .cg-eq .big{color:var(--c-dark); font-size:25px;}

  .m-board{display:flex; flex-direction:column; gap:10px; min-height:50px;}
  .m-group{display:flex; flex-wrap:wrap; gap:6px; padding:8px 10px; border-radius:16px; background:var(--bg); border:2px dashed color-mix(in srgb,var(--c) 45%, white);}
  .crit{font-size:28px; line-height:1; animation:pop .35s ease both;}
  @keyframes pop{0%{transform:scale(0) rotate(-20deg); opacity:0;} 70%{transform:scale(1.25);} 100%{transform:scale(1); opacity:1;}}

  .arr-grid{display:grid; gap:6px; justify-content:center; margin:6px auto;}
  .dot{width:26px; height:26px; border-radius:50%; background:var(--c); animation:pop .3s ease both;}

  .nl-wrap{overflow-x:auto; padding:6px 0;}
  .plates{display:flex; gap:10px; justify-content:center; flex-wrap:wrap;}
  .plate{width:88px; min-height:88px; border-radius:50%/40%; background:#f1f0f5; border:3px solid #e2e0ea; display:flex; flex-wrap:wrap; align-content:center; justify-content:center; gap:3px; padding:8px;}
  .plate .crit{font-size:22px;}
  .plate-cap{text-align:center; font-weight:800; font-size:13px; color:var(--soft); margin-top:4px;}
  .box{width:84px; min-height:60px; border:3px solid var(--c); border-radius:12px; background:var(--bg); display:flex; flex-wrap:wrap; align-content:center; justify-content:center; gap:2px; padding:6px;}
  .box .crit{font-size:20px;}

  .frac-wrap{text-align:center;}
  .frac-cmp{display:flex; justify-content:center; gap:8px; align-items:flex-end; margin-top:8px; flex-wrap:wrap;}
  .frac-cmp .col{text-align:center;}
  .frac-disp{font-size:22px; font-weight:900; color:var(--c-dark);}
  .frac-disp .l{display:inline-flex; flex-direction:column; line-height:1; vertical-align:middle; font-size:24px;}
  .frac-disp .l .n{border-bottom:3px solid var(--c-dark); padding:0 6px;}
  .bar-cells{display:flex; border:3px solid var(--c-dark); border-radius:10px; overflow:hidden; max-width:300px; margin:8px auto;}
  .bar-cells > div{flex:1; height:46px; cursor:pointer;}

  .ruler{position:relative; height:70px; background:#fff3d6; border:2px solid #f0c965; border-radius:10px; margin:6px 0 4px; overflow:hidden;}
  .ruler .fill{position:absolute; left:0; top:0; bottom:0; background:color-mix(in srgb,var(--c) 35%, white);}
  .tick{position:absolute; top:0; width:2px; background:#caa64a;}
  .tick.cm{height:30px; background:#a07a18;}
  .tick .n{position:absolute; top:32px; left:50%; transform:translateX(-50%); font-size:11px; font-weight:800; color:#8a6a14;}
  .seg-row{display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-top:8px;}
  .seg{background:color-mix(in srgb,var(--c) 30%, white); border:2px solid var(--c); border-radius:10px; padding:6px 8px; font-weight:800; color:var(--c-dark); font-size:13px;}

  .beaker{width:120px; height:170px; margin:0 auto; border:4px solid #9fc6e8; border-top:none; border-radius:0 0 22px 22px; position:relative; background:#f2f9ff; overflow:hidden;}
  .beaker .liquid{position:absolute; left:0; right:0; bottom:0; background:linear-gradient(#56b0f5,#2e86de); transition:height .35s;}
  .beaker .mark{position:absolute; left:0; right:0; height:0; border-top:2px dashed #9fc6e8;}
  .beaker .mark span{position:absolute; right:4px; top:-9px; font-size:10px; font-weight:800; color:#3a7ab5; background:#f2f9ff; padding:0 3px;}
  .scale-read{font-size:22px; font-weight:900; color:var(--c-dark); text-align:center; margin-top:8px;}
  .scale-beam{height:10px; background:#bbb; border-radius:6px; margin:14px auto 0; max-width:240px; transform-origin:center; transition:transform .4s;}

  /* 퀴즈/문제은행/복습 */
  .quiz-top{display:flex; justify-content:space-between; align-items:center; gap:6px; margin-bottom:10px; font-weight:800;}
  .score-pill{background:#fff; border:2px solid #eee; border-radius:14px; padding:6px 11px; font-size:13.5px; box-shadow:0 3px 8px rgba(0,0,0,.05);}
  .progress{height:16px; background:#ececf3; border-radius:10px; overflow:hidden; margin-bottom:14px;}
  .progress .bar{height:100%; width:0; background:linear-gradient(90deg,var(--c),var(--c-dark)); transition:width .4s; border-radius:10px;}
  .q-card{background:#fff; border-radius:22px; padding:20px 16px; box-shadow:0 6px 16px rgba(0,0,0,.08); text-align:center; min-height:120px;}
  .q-retry{display:inline-block; background:#ffe7d1; color:var(--c-dark); font-weight:800; font-size:13px; padding:3px 10px; border-radius:12px; margin-bottom:10px;}
  .q-text{font-size:24px; font-weight:900; letter-spacing:-.5px;}
  .q-text .b{color:var(--c-dark);}
  .q-visual{margin:12px 0 4px;}
  .ans-box{margin:16px auto 4px; width:160px; height:58px; border-radius:16px; border:3px solid var(--c); background:var(--bg); display:flex; align-items:center; justify-content:center; font-size:28px; font-weight:900; color:var(--c-dark);}
  .ans-box.empty{color:#cfc8bd;}
  .feedback{min-height:26px; font-weight:800; font-size:16px; margin:10px 0 2px;}
  .feedback.ok{color:#19a974;}
  .feedback.no{color:#e8503a;}
  .hintbox{background:#fffbe9; border:2px solid #ffe08a; border-radius:14px; padding:12px 14px; font-size:15px; font-weight:600; color:#8a6a14; margin-top:10px; display:none;}
  .hintbox.show{display:block; animation:pop .3s ease;}
  .keypad{display:grid; grid-template-columns:repeat(3,1fr); gap:9px; margin-top:16px;}
  .key{background:#fff; border:2px solid #eee; border-radius:16px; padding:15px 0; font-size:24px; font-weight:900; color:var(--ink); box-shadow:0 3px 8px rgba(0,0,0,.05);}
  .key:active{transform:scale(.94); background:var(--bg);}
  .key.del{color:#e8503a; font-size:20px;}
  .key.ok{background:var(--c); color:#fff; border-color:var(--c); font-size:19px;}
  .stopbtn{background:#fff; border:2px solid var(--c); color:var(--c-dark); border-radius:14px; padding:6px 12px; font-size:14px; font-weight:800;}

  /* 객관식 */
  .choice-grid{display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-top:16px;}
  .choice-btn{background:#fff; border:2.5px solid #eee; border-radius:16px; padding:14px 8px; font-size:16px; font-weight:800; color:var(--ink); box-shadow:0 3px 8px rgba(0,0,0,.05);}
  .choice-btn:active{transform:scale(.96);}
  .choice-btn.correct{border-color:#19a974; background:#e7f9f1; color:#0e7d57;}
  .choice-btn.wrongpick{border-color:#e8503a; background:#fdecea; color:#c0392b;}
  .choice-btn:disabled{opacity:.95;}

  /* 짝맞추기 게임 */
  .match-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
  .match-card{background:#fff; border:2.5px solid #eee; border-radius:14px; min-height:64px; padding:8px 4px; font-size:14px; font-weight:800; color:var(--ink); box-shadow:0 3px 8px rgba(0,0,0,.05);}
  .match-card.sel{border-color:var(--c); background:var(--bg); transform:scale(1.05);}
  .match-card.done{border-color:#19a974; background:#e7f9f1; color:#0e7d57;}

  /* 분류 게임 */
  .sort-item{font-size:24px; font-weight:900; text-align:center; background:var(--bg); border:3px dashed color-mix(in srgb,var(--c) 45%, white); border-radius:16px; padding:20px 10px; margin-top:10px;}
  .bucket-row{display:flex; gap:10px; margin-top:14px;}
  .bucket{flex:1; padding:18px 8px; border-radius:18px; font-weight:900; font-size:15.5px; border:3px solid #eee; background:#fff; box-shadow:0 3px 8px rgba(0,0,0,.06); color:var(--ink);}
  .bucket:active{transform:scale(.96); background:var(--bg);}

  /* 알파벳 순서 게임 */
  .alpha-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:10px;}

  /* 과목 구분 */
  .subj-head{display:flex; align-items:center; gap:7px; font-size:17px; font-weight:900; margin:18px 2px 2px;}
  .subj-head .line{flex:1; height:2px; background:#eee; border-radius:2px;}

  /* 분석 */
  .cat-row{margin-bottom:10px;}
  .cat-row .lab{display:flex; justify-content:space-between; font-weight:800; font-size:14px;}
  .cat-row .sub{font-size:12px; color:var(--soft);}
  .dash-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .dash-stat{background:var(--bg); border-radius:16px; padding:12px; text-align:center;}
  .dash-stat .v{font-size:22px; font-weight:900; color:var(--c-dark);}
  .dash-stat .k{font-size:12px; color:var(--soft); font-weight:700;}
  .logrow{display:flex; justify-content:space-between; font-size:13px; padding:7px 0; border-bottom:1px solid #f0eee9;}
  .logrow .d{color:var(--soft);}

  /* 결과 */
  .result{text-align:center; padding:8px 0;}
  .result .stars{font-size:44px; letter-spacing:6px;}
  .result h2{font-size:23px; margin:8px 0;}
  .result .msg{font-size:16px; color:var(--soft); margin-bottom:12px;}
  .result .stat{display:inline-block; background:var(--bg); border-radius:14px; padding:10px 16px; margin:4px; font-weight:800; font-size:15px;}
  .reward-banner{background:linear-gradient(135deg,#fff3d6,#ffe0ea); border-radius:18px; padding:14px; margin:6px 0 4px; font-weight:900; font-size:18px; color:var(--c-dark);}
  .bigbtn{display:block; width:100%; margin-top:12px; padding:16px; border-radius:18px; background:var(--c); color:#fff; font-size:18px; font-weight:900; box-shadow:0 6px 16px rgba(0,0,0,.16);}
  .bigbtn.ghost{background:#fff; color:var(--c-dark); border:2px solid var(--c);}
  .bigbtn:active{transform:scale(.98);}

  /* 아이돌 카드 */
  .gallery{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;}
  .idol-card{border-radius:18px; overflow:hidden; box-shadow:0 5px 14px rgba(0,0,0,.12); background:#fff; position:relative;}
  .idol-card .idol-art{aspect-ratio:1/1.15; background:linear-gradient(160deg,var(--g2),var(--g1)); display:flex; align-items:center; justify-content:center;}
  .idol-card.locked .idol-art{background:#e9e7f0; filter:grayscale(1);}
  .idol-card .idol-art svg{width:86%; height:86%;}
  .idol-card .lock{font-size:30px;}
  .idol-card .idol-name{text-align:center; font-weight:900; font-size:13px; padding:6px 2px 2px;}
  .idol-card .idol-cost{text-align:center; font-size:11px; color:var(--soft); padding-bottom:7px; font-weight:700;}

  /* 응원 팝업 */
  .idol-pop{position:fixed; left:50%; bottom:calc(18px + env(safe-area-inset-bottom)); transform:translate(-50%,140%); z-index:120;
    display:flex; align-items:flex-end; gap:8px; pointer-events:none; transition:transform .4s cubic-bezier(.2,1.3,.4,1); width:min(420px,92vw);}
  .idol-pop.show{transform:translate(-50%,0);}
  .idol-pop .pop-art{width:74px; height:74px; border-radius:16px; background:linear-gradient(160deg,#ffd3e0,#ffe9b0); flex:0 0 auto; box-shadow:0 6px 16px rgba(0,0,0,.18); overflow:hidden;}
  .idol-pop .pop-art svg{width:100%; height:100%;}
  .idol-pop .pop-bubble{background:#fff; border:2px solid var(--c); border-radius:16px 16px 16px 4px; padding:10px 14px; font-weight:800; font-size:15px; box-shadow:0 6px 16px rgba(0,0,0,.14); color:var(--ink);}
  .idol-pop .pop-bubble b{color:var(--c-dark);}

  /* 꽃가루 */
  #confetti{position:fixed; inset:0; pointer-events:none; z-index:99; overflow:hidden;}
  .conf{position:absolute; width:10px; height:14px; top:-20px; border-radius:2px; animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg); opacity:.9;}}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div id="confetti"></div>

<script>
"use strict";
/* =========================================================
   리원이 수학 놀이터 v2
   개념(다양한 방법) → 그림게임(여러 종류) → 퀴즈 → 문제은행 → 복습/분석
   + 스티커/경험치(반복 보상 체감) + 아이돌 캐릭터 카드 수집 + 응원 팝업
   + 공부 기록(부모용 대시보드) + on-device 저장 + PWA(오프라인/홈화면)
   외부 라이브러리 없음. 아이돌 캐릭터는 모두 오리지널 일러스트(저작권 무관).
   ========================================================= */

const SUBJECTS=[
  {id:'math', name:'수학', emoji:'🧮'},
  {id:'kor',  name:'국어', emoji:'📖'},
  {id:'eng',  name:'영어', emoji:'🔤'},
  {id:'sci',  name:'과학', emoji:'🔬'},
  {id:'soc',  name:'사회', emoji:'🏘️'},
];
const UNITS = [
  {id:'mul',  subj:'math', emoji:'🐸', name:'곱셈',        sub:'몇 배로 늘어나기',  c:'#ff9f43', cd:'#e67e22', gname:'그림게임'},
  {id:'div',  subj:'math', emoji:'🍪', name:'나눗셈',      sub:'똑같이 나누기',     c:'#ee5253', cd:'#c0392b', gname:'그림게임'},
  {id:'frac', subj:'math', emoji:'🍕', name:'분수',        sub:'똑같이 나눈 조각',  c:'#10ac84', cd:'#0a8f6f', gname:'그림게임'},
  {id:'len',  subj:'math', emoji:'📏', name:'길이와 시간', sub:'mm·cm·m, 분·초',    c:'#5f27cd', cd:'#4a1fa6', gname:'그림게임'},
  {id:'cap',  subj:'math', emoji:'⚖️', name:'들이와 무게', sub:'L·mL, kg·g',        c:'#2e86de', cd:'#1f6dbf', gname:'그림게임'},
  {id:'kor1', subj:'kor',  emoji:'✏️', name:'맞춤법 달인', sub:'헷갈리는 말 정복',  c:'#f368e0', cd:'#c23593', gname:'낱말게임'},

let AC=null;
function sfx(kind){
  if(DB.muted) return;
  try{
    AC=AC||new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state==='suspended') AC.resume();
    const t=AC.currentTime;
    const seq = kind==='ok' ? [[523,0],[659,.09],[784,.18]]
            : kind==='no' ? [[330,0],[262,.14]]
            : kind==='win'? [[523,0],[659,.1],[784,.2],[1047,.32]]
            : [[440,0]];
    seq.forEach(([f,d])=>{
      const o=AC.createOscillator(),g=AC.createGain();
      o.type='sine'; o.frequency.value=f;
      g.gain.setValueAtTime(.0001,t+d);
      g.gain.exponentialRampToValueAtTime(.16,t+d+.02);
      g.gain.exponentialRampToValueAtTime(.0001,t+d+.22);
      o.connect(g); g.connect(AC.destination);
      o.start(t+d); o.stop(t+d+.26);
    });
  }catch(e){}
}

function genOne(unitId,g){ const o=g.make(); o.cat=g.cat; o.unitId=unitId; return o; }
function pickGen(unitId){
  const gens=MODULES[unitId].gens, st=unitDB(unitId).cats;
  const w=gens.map(g=>1+2*((st[g.cat]&&st[g.cat].wrong)||0));
  let sum=w.reduce((a,b)=>a+b,0), r=Math.random()*sum;
  for(let i=0;i<gens.length;i++){ r-=w[i]; if(r<=0) return gens[i]; }
  return gens[gens.length-1];
}
function buildMasterSet(unitId, deep){
  const gens=deep? MODULES[unitId].deepGens : MODULES[unitId].gens;
  const per=gens.length>=4?2:3, set=[];
  gens.forEach(g=>{ for(let k=0;k<per;k++) set.push(genOne(unitId,g)); });
  return shuffle(set).slice(0, Math.min(14, set.length));
}

  const set=buildMasterSet(unitId,deep); set.forEach((s,i)=>s.id=i);
  PLAY={mode:'master',unitId,body,deep:!!deep,queue:set,total:set.length,solved:new Set(),score:0,retry:0,streak:0,corr:0,cur:null,buf:'',locked:false};

}

function startReview(unitId){
  const body=$('#stage-body');
  const pool=DB.wrong.filter(w=>w.unitId===unitId);
  if(pool.length===0){ renderReview(body,unitId); return; }
  PLAY={mode:'review',unitId,body,queue:shuffle(pool.map(p=>Object.assign({fromWrong:true},p))),startN:pool.length,fixed:0,score:0,streak:0,corr:0,cur:null,buf:'',locked:false};
  advance();
}
function advance(){
  const P=PLAY; if(!P)return; P.buf=''; P.locked=false; P.awaitNext=false;
  if(P.mode==='master'){ if(P.queue.length===0)return finishMaster(); P.cur=P.queue.shift(); renderCard(); }
  else if(P.mode==='bank'){ P.cur=genOne(P.unitId,pickGen(P.unitId)); renderCard(); }
  else { if(P.queue.length===0)return finishReview(); P.cur=P.queue.shift(); renderCard(); }
}

           :`<div class="ans-box empty" id="ans">?</div>`}

      ${isC?'':`<div class="keypad">
        ${[1,2,3,4,5,6,7,8,9].map(d=>`<button class="key" onclick="press('${d}')">${d}</button>`).join('')}
        <button class="key del" onclick="press('del')">⌫</button>
        <button class="key" onclick="press('0')">0</button>
        <button class="key ok" onclick="press('ok')">확인</button>
      </div>`}
    </div>`;
}
function press(k){
  const P=PLAY; if(!P||!P.cur||P.locked||P.helping)return; const ans=$('#ans');
  if(k==='del') P.buf=P.buf.slice(0,-1);
  else if(k==='ok') return submit();
  else if(P.buf.length<5) P.buf+=k;
  if(ans){ ans.textContent=P.buf===''?'?':P.buf; ans.classList.toggle('empty',P.buf===''); }
}
function ansShow(c){ return c.choices ? '"'+c.choices[c.a]+'"' : c.a; }
function choosePick(i){
  const P=PLAY; if(!P||!P.cur||P.locked||P.helping||P.awaitNext)return;
  P.buf=String(i); submit();
}
function submit(){
  const P=PLAY; if(!P||!P.cur||P.locked||P.helping||P.buf==='')return;
  const c=P.cur, val=parseInt(P.buf,10), ok=(val===c.a), fb=$('#fb');
  markStat(P.unitId,c.cat,ok);
  const ansEl=$('#ans');
  if(c.choices){ c.choices.forEach((_,i)=>{ const b=$('#ch'+i); if(!b)return; b.disabled=true;
    if(i===c.a) b.classList.add('correct'); else if(i===val&&!ok) b.classList.add('wrongpick'); }); }
  if(ok){
    P.locked=true; P.streak++; P.corr++; confetti(false); sfx('ok');
    fb.className='feedback ok'; fb.textContent='정답이에요! 🎉'; if(ansEl)ansEl.style.borderColor='#19a974';
    if(P.mode==='master'){ P.solved.add(c.id); P.score+=c.retry?3:5; }
    else if(P.mode==='bank'){ P.score+=10; P.count++; }
    else { removeFromWrong(c); P.score+=5; P.fixed++; }
    // 응원 팝업 (적당한 때)
    const comeback=(c.retry||c.fromWrong);
    if(comeback){ idolPopup(pick(LINES.comeback)); lastPopupAt=P.corr; }
    else if([3,5,8,10,15,20].indexOf(P.streak)>=0){ idolPopup(pick(LINES.streak).replace('{n}',P.streak)); lastPopupAt=P.corr; }
    else if(P.corr-lastPopupAt>=5 && Math.random()<0.6){ idolPopup(pick(LINES.praise)); lastPopupAt=P.corr; }
    saveDB();
    later(advance,1000);
  } else {
    P.locked=true; P.awaitNext=true; P.streak=0; sfx('no');
    fb.className='feedback no'; fb.textContent='앗! 정답은 '+ansShow(c)+' 예요. 왜 그런지 천천히 살펴보자 👀'; if(ansEl)ansEl.style.borderColor='#e8503a';
    $('#hint').classList.add('show');
    if(P.mode==='master'){ P.retry++; P.queue.push(Object.assign({},c,{retry:true})); addWrong(c); }
    else if(P.mode==='bank'){ P.count++; P.wrongCount++; addWrong(c); }
    else { const e=DB.wrong.find(w=>w.key===c.key); if(e)e.miss++; P.queue.push(c); }
    saveDB();
    const help=(P.mode==='bank'||P.mode==='review')?`<button class="bigbtn ghost" onclick="openHelp()">🙋 왜 틀렸을까? 차근차근 보기</button>`:'';
    const pc=$('#play-controls'); if(pc) pc.innerHTML=help+`<button class="bigbtn" onclick="advance()">다음 문제로 ▶</button>`;
  }
}
function stopPlay(){ clearTimers(); if(PLAY.mode==='bank') finishBank(); else finishReview(); }
document.addEventListener('keydown',e=>{
  if(!PLAY)return;
  if(PLAY.helping){
    if(!document.getElementById('tans'))return;
    if(e.key>='0'&&e.key<='9') tutorPress(e.key);
    else if(e.key==='Backspace'){ e.preventDefault(); tutorPress('del'); }
    else if(e.key==='Enter'){ e.preventDefault(); tutorPress('ok'); }
    return;
  }
  if(!PLAY.cur)return;
  if(PLAY.awaitNext){ if(e.key==='Enter'){ e.preventDefault(); advance(); } return; }
  if(PLAY.cur.choices){ const n=parseInt(e.key,10); if(n>=1&&n<=PLAY.cur.choices.length) choosePick(n-1); return; }
  if(e.key>='0'&&e.key<='9') press(e.key);
  else if(e.key==='Backspace'){ e.preventDefault(); press('del'); }
  else if(e.key==='Enter'){ e.preventDefault(); press('ok'); }
});

function weekChart(){
  const names=['일','월','화','수','목','금','토'];
  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date(Date.now()-i*86400000);
    const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const r=DB.days[k]||{s:0,c:0,sec:0};
    days.push({lab:names[d.getDay()], s:r.s, sec:r.sec, today:i===0});
  }
  const mx=Math.max(1,...days.map(x=>x.s));
  return `<div style="display:flex;gap:6px;align-items:flex-end;height:110px;padding-top:8px">
    ${days.map(d=>`<div style="flex:1;text-align:center">
      <div style="font-size:11px;font-weight:800;color:var(--c-dark)">${d.s||''}</div>
      <div style="height:${Math.round(d.s/mx*70)+4}px;background:${d.today?'var(--c-dark)':'var(--c)'};border-radius:6px 6px 0 0;opacity:${d.s?1:.25}"></div>
      <div style="font-size:11px;font-weight:700;color:${d.today?'var(--c-dark)':'var(--soft)'}">${d.lab}</div>
      <div style="font-size:10px;color:var(--soft)">${d.sec?Math.round(d.sec/60)+'분':''}</div>
    </div>`).join('')}
  </div>`;
}

      <div class="gallery">

        <button class="idol-card" style="border:3px dashed var(--c);background:var(--bg);min-height:120px;font-size:34px;color:var(--c-dark)" onclick="document.getElementById('famfile').click()">＋<div style="font-size:12px;font-weight:800">사진 추가</div></button>
      </div>

    </div>

}
function addFamilyCard(input){
  const f=input.files&&input.files[0]; if(!f)return;
  if(DB.fam.length>=8){ alert('가족 카드는 8장까지예요!'); input.value=''; return; }
  const rd=new FileReader();
  rd.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const cv=document.createElement('canvas'); cv.width=300; cv.height=340;
      const s=Math.min(img.width,img.height*300/340);
      const sw=s, sh=s*340/300;
      const ctx=cv.getContext('2d');
      ctx.drawImage(img,(img.width-sw)/2,(img.height-sh)/2,sw,sh,0,0,300,340);
      const url=cv.toDataURL('image/jpeg',.82);
      const name=(prompt('이 카드의 이름을 지어줘! (예: 엄마, 도율이)','우리가족')||'우리가족').slice(0,8);
      DB.fam.push({name, img:url, line:name+'! 항상 응원해 💖'});
      saveDB(); input.value=''; renderGallery();
    };
    img.src=rd.result;
  };
  rd.readAsDataURL(f);
}
function delFamilyCard(i){
  if(!confirm('이 카드를 지울까요?'))return;
  DB.fam.splice(i,1); saveDB(); renderGallery();
}

/* ===================== 🙋 도와주세요 (인강 튜터) =====================
   현재 문제를 단계별로 쪼개 설명하고, 중간에 미니 문제로 이해를 확인.
   틀려도 막지 않고 다시 알려준 뒤 다음 단계로. */
const TUTOR={
  mul(t){const{a,b}=t; const sum=Array(b).fill(a).join(' + ');
    return [
      {type:'say',text:`<b>${a} × ${b}</b> 는 '${a}을 ${b}번 더하기'야. 같이 해보자! 🐸`,more:`곱하기는 같은 수를 여러 번 더하는 빠른 방법이야.`},
      {type:'ask',text:`먼저 쉬운 것부터! ${a} + ${a} 는?`,a:a*2,reteach:`${a}+${a}=${a*2} 이야.`},
      {type:'say',text:`좋아! 이렇게 ${a}씩 더해 나가는 거야.<br>${sum} = <b>${a*b}</b>`},
      {type:'done',text:`그래서 <b>${a} × ${b} = ${a*b}</b>! 이제 직접 입력해볼까? ✏️`,a:a*b},
    ];},
  mulTens(t){const{a,b}=t; const d=a/10;
    return [
      {type:'say',text:`<b>${a} × ${b}</b> 커 보여도 쉬워! ${a}는 ${d}의 10배거든.`},
      {type:'ask',text:`작은 곱셈 먼저! ${d} × ${b} 는?`,a:d*b,reteach:`${d}×${b}=${d*b} 이야.`},
      {type:'say',text:`거기에 0을 하나 붙이면 끝! ${d*b} → <b>${d*b}0</b>`},
      {type:'done',text:`<b>${a} × ${b} = ${a*b}</b>! 직접 입력해보자 ✏️`,a:a*b},
    ];},
  mul2(t){const{a,b}=t; const t0=Math.floor(a/10)*10,o=a%10;
    return [
      {type:'say',text:`두 자리 곱셈의 비법은 <b>쪼개기</b>! ${a} = ${t0} + ${o} 로 나눠.`},
      {type:'ask',text:`먼저 ${t0} × ${b} 는?`,a:t0*b,reteach:`${t0}×${b}=${t0*b}.`},
      {type:'ask',text:`그다음 ${o} × ${b} 는?`,a:o*b,reteach:`${o}×${b}=${o*b}.`},
      {type:'say',text:`이제 둘을 더하면 끝! ${t0*b} + ${o*b} = <b>${a*b}</b>`},
      {type:'done',text:`<b>${a} × ${b} = ${a*b}</b>! ✏️`,a:a*b},
    ];},
  divMul(t){const{a,b,c}=t;
    return [
      {type:'say',text:`나눗셈은 곱셈을 거꾸로! <b>${a} ÷ ${b}</b> 는 '${b} 곱하기 몇이 ${a}?'를 찾는 거야. 🔁`,more:`${b}단을 떠올려봐: ${b}, ${b*2}, ${b*3}... ${a}가 나올 때까지!`},
      {type:'ask',text:`${b} × 몇 = ${a} 일까? 그 '몇'을 입력!`,a:c,reteach:`${b}×${c}=${a} 니까 답은 ${c}.`},
      {type:'done',text:`맞아! <b>${a} ÷ ${b} = ${c}</b> ✏️`,a:c},
    ];},
  divShare(t){const{a,b,c}=t;
    return [
      {type:'say',text:`사탕 ${a}개를 ${b}명이 똑같이 나눠 가져. 한 명은 몇 개? 🍬`},
      {type:'say',text:`한 개씩 돌아가며 주는 걸 빠르게 = 나눗셈! ${b}×몇=${a} 를 생각해.`},
      {type:'ask',text:`${b} × 몇 = ${a}?`,a:c,reteach:`${b}×${c}=${a}.`},
      {type:'done',text:`한 명당 <b>${c}개</b>! (${a}÷${b}=${c}) ✏️`,a:c},
    ];},
  divGroup(t){const{a,per,grp}=t;
    return [
      {type:'say',text:`${a}개를 ${per}개씩 봉지에 담아. 봉지가 몇 개 나올까? 📦`},
      {type:'ask',text:`${per} × 몇 = ${a}?`,a:grp,reteach:`${per}×${grp}=${a}.`},
      {type:'done',text:`봉지 <b>${grp}개</b>! (${a}÷${per}=${grp}) ✏️`,a:grp},
    ];},
  fracNum(t){const{n,m}=t;
    return [
      {type:'say',text:`분수에서 <b>분자</b>(위 숫자)는 '색칠한 칸 수'야.`,visual:fracBar(n,m)},
      {type:'ask',text:`색칠된 칸은 몇 칸일까? 세어봐!`,a:m,reteach:`색칠된 칸은 ${m}개야.`},
      {type:'done',text:`맞아, 분자는 <b>${m}</b>! ✏️`,a:m},
    ];},
  fracDen(t){const{n,m}=t;
    return [
      {type:'say',text:`<b>분모</b>(아래 숫자)는 '전체를 똑같이 나눈 칸 수'야.`,visual:fracBar(n,m)},
      {type:'ask',text:`칸이 모두 몇 개야?`,a:n,reteach:`전체 칸은 ${n}개.`},
      {type:'done',text:`분모는 <b>${n}</b>! ✏️`,a:n},
    ];},
  fracCmp(t){const{x,y}=t; const mn=Math.min(x,y);
    return [
      {type:'say',text:`피자를 많이 자를수록 한 조각은 작아져. 그래서 <b>분모가 작을수록 더 큰 분수</b>야! 🍕`},
      {type:'ask',text:`${x} 와 ${y} 중 더 작은 수는?`,a:mn,reteach:`${mn}이 더 작아.`},
      {type:'done',text:`그러니 더 큰 분수는 1/${mn}, 분모는 <b>${mn}</b>! ✏️`,a:mn},
    ];},
  fracLeft(t){const{n,m}=t;
    return [
      {type:'say',text:`전체 ${n}조각에서 ${m}조각을 먹었어. 남은 건 <b>빼기</b>로!`},
      {type:'ask',text:`${n} - ${m} 는?`,a:n-m,reteach:`${n}-${m}=${n-m}.`},
      {type:'done',text:`남은 조각은 <b>${n-m}</b>! ✏️`,a:n-m},
    ];},
  conv(t){const{v,f,op,bu,su}=t;
    if(op==='mul') return [
      {type:'say',text:`${bu}를 ${su}로 바꿀 땐 <b>×${f}</b> 야. (1${bu}=${f}${su})`,more:`단위가 더 잘게 쪼개지니까 숫자는 커져. 그래서 곱하기!`},
      {type:'ask',text:`${v} × ${f} 는?`,a:v*f,reteach:`${v}×${f}=${v*f}.`},
      {type:'done',text:`<b>${v}${bu} = ${v*f}${su}</b>! ✏️`,a:v*f},
    ];
    return [
      {type:'say',text:`${su} 단위가 더 크니까 묶어줘야 해. ${bu}→${su} 는 <b>÷${f}</b>! (${f}${bu}=1${su})`,more:`${f}개씩 묶으면 1${su}. 그래서 나누기!`},
      {type:'ask',text:`${v} ÷ ${f} 는?`,a:v/f,reteach:`${v}÷${f}=${v/f}.`},
      {type:'done',text:`<b>${v}${bu} = ${v/f}${su}</b>! ✏️`,a:v/f},
    ];},
  compound(t){const{big,small,f,bu,su}=t;
    return [
      {type:'say',text:`단위가 섞였네! 먼저 큰 단위(${bu})를 작은 단위(${su})로 바꾸자. 🧮`},
      {type:'ask',text:`${big}${bu} 를 ${su}로: ${big} × ${f} = ?`,a:big*f,reteach:`${big}×${f}=${big*f}.`},
      {type:'say',text:`이제 남은 ${small}${su}를 더하면 끝!`},
      {type:'ask',text:`${big*f} + ${small} = ?`,a:big*f+small,reteach:`${big*f}+${small}=${big*f+small}.`},
      {type:'done',text:`<b>= ${big*f+small}${su}</b>! ✏️`,a:big*f+small},
    ];},
  unitOp(t){const{big,small,f,bu,su,sign}=t; const res=big*f+sign*small;
    return [
      {type:'say',text:`더하거나 빼기 전에 <b>단위를 똑같이</b> 맞춰야 해!`,more:`${bu}랑 ${su}는 단위가 달라서 그냥 못 더해. 먼저 ${su}로 통일!`},
      {type:'ask',text:`${big}${bu} 를 ${su}로: ${big} × ${f} = ?`,a:big*f,reteach:`${big}×${f}=${big*f}.`},
      {type:'say',text:`이제 ${sign>0?'더하자':'빼자'}: ${big*f} ${sign>0?'+':'-'} ${small}`},
      {type:'ask',text:`${big*f} ${sign>0?'+':'-'} ${small} = ?`,a:res,reteach:`답은 ${res}.`},
      {type:'done',text:`<b>= ${res}${su}</b>! ✏️`,a:res},
    ];},
};
function tutorBeats(q){
  if(q.t && TUTOR[q.t.k]) return TUTOR[q.t.k](q.t,q);
  return [{type:'say',text:`천천히 힌트를 같이 보자. 💡 ${q.hint}`},{type:'done',text:`정답은 <b>${q.choices?q.choices[q.a]:q.a}</b>! 이제 직접 ${q.choices?'골라보자':'입력해보자'} ✏️`,a:q.a}];
}
function openHelp(){
  const P=PLAY; if(!P||!P.cur||(P.locked&&!P.awaitNext)) return;
  clearTimers(); P.helping=true; P.buf='';
  window._TT={beats:tutorBeats(P.cur), i:0, buf:'', locked:false, adv:!!P.awaitNext};
  renderBeat();
}
function renderBeat(){
  const T=window._TT, b=T.beats[T.i], total=T.beats.length; let inner='';
  if(b.type==='say'){
    inner=`<div class="q-text" style="font-size:19px;line-height:1.5">${b.text}</div>
      ${b.visual?`<div class="q-visual">${b.visual}</div>`:''}
      ${b._more&&b.more?`<div class="tipbox" style="text-align:left">${b.more}</div>`:''}
      <div style="margin-top:16px;display:flex;gap:8px;flex-direction:column">
        <button class="bigbtn" onclick="tutorNext()">응, 알겠어! ▶</button>
        ${b.more&&!b._more?`<button class="bigbtn ghost" onclick="tutorMore()">음.. 잘 모르겠어 🤔</button>`:''}
      </div>`;
  } else if(b.type==='ask'){
    inner=`<div class="q-text" style="font-size:20px">${b.text}</div>
      <div class="ans-box empty" id="tans">?</div>
      <div class="feedback" id="tfb"></div>
      <div class="keypad">
        ${[1,2,3,4,5,6,7,8,9].map(d=>`<button class="key" onclick="tutorPress('${d}')">${d}</button>`).join('')}
        <button class="key del" onclick="tutorPress('del')">⌫</button>
        <button class="key" onclick="tutorPress('0')">0</button>
        <button class="key ok" onclick="tutorPress('ok')">확인</button>
      </div>`;
  } else {
    inner=`<div class="q-text" style="font-size:20px;line-height:1.5">${b.text}</div>
      <button class="bigbtn" onclick="closeHelp()" style="margin-top:16px">✏️ 이제 직접 풀래!</button>`;
  }
  PLAY.body.innerHTML=`
    <div class="quiz-top"><span class="score-pill">🙋 선생님이 도와줄게</span><span class="score-pill">${T.i+1}/${total}</span><button class="stopbtn" onclick="closeHelp()">닫기</button></div>
    <div class="q-card">${inner}</div>`;
}
function tutorMore(){ const T=window._TT; T.beats[T.i]._more=true; renderBeat(); }
function tutorNext(){ const T=window._TT; T.i++; T.buf=''; T.locked=false; if(T.i>=T.beats.length){ closeHelp(); return; } renderBeat(); }
function tutorPress(k){
  const T=window._TT; if(!T||T.locked)return; const ans=$('#tans');
  if(k==='del') T.buf=T.buf.slice(0,-1);
  else if(k==='ok') return tutorCheck();
  else if(T.buf.length<6) T.buf+=k;
  if(ans){ ans.textContent=T.buf===''?'?':T.buf; ans.classList.toggle('empty',T.buf===''); }
}
function tutorCheck(){
  const T=window._TT, b=T.beats[T.i]; if(T.buf===''||T.locked)return;
  const fb=$('#tfb'), val=parseInt(T.buf,10);
  T.locked=true;
  if(val===b.a){ fb.className='feedback ok'; fb.textContent='딩동댕! 맞았어 👏'; confetti(false); sfx('ok'); later(tutorNext,950); }
  else { fb.className='feedback no'; fb.textContent='괜찮아! '+(b.reteach||('정답은 '+b.a)); sfx('no'); later(tutorNext,2400); }
}
function closeHelp(){ const P=PLAY; if(!P)return; clearTimers(); P.helping=false; P.buf='';
  const adv=window._TT&&window._TT.adv;
  if(adv){ advance(); } else { P.locked=false; renderCard(); }
}

/* ===================== 꽃가루 ===================== */
function confetti(big){
  const box=document.getElementById('confetti');
  const n=big?130:30; const colors=['#ff6b6b','#feca57','#48dbfb','#1dd1a1','#ff9ff3','#54a0ff','#ff9f43'];
  for(let i=0;i<n;i++){ const c=document.createElement('div'); c.className='conf';
    c.style.left=Math.random()*100+'vw'; c.style.background=colors[i%colors.length];
    c.style.animationDuration=(1.6+Math.random()*1.4)+'s'; c.style.animationDelay=(Math.random()*.3)+'s';
    c.style.width=(7+Math.random()*7)+'px'; c.style.height=(10+Math.random()*8)+'px';
    box.appendChild(c); setTimeout(()=>c.remove(),3200); }
}

function poolGen(cat, pool){
  return {cat, make(){
    const it=pick(pool);
    const wrong=shuffle(it.w).slice(0,3);
    const choices=shuffle([it.c].concat(wrong));
    return {q:it.q, choices, a:choices.indexOf(it.c), hint:it.h};
  }};
}
function matchGame(pairsAll, tip){
  return function(host){ window._mtData={pairsAll, tip, host}; mtReset(); };
}
function mtReset(){
  const {pairsAll, tip, host}=window._mtData;
  const pairs=shuffle(pairsAll).slice(0,6);
  const cards=shuffle(pairs.flatMap((p,i)=>[{t:p[0],k:i},{t:p[1],k:i}]));
  window._mt={cards, sel:-1, done:new Set(), lock:false};
  host.innerHTML=`<div class="card">
    <p class="cg-tip">${tip}</p>
    <div class="match-grid">${cards.map((c,i)=>`<button class="match-card" id="mc${i}" onclick="mtTap(${i})">${c.t}</button>`).join('')}</div>
    <p style="text-align:center;font-weight:800;margin:12px 0 0" id="mt-msg">짝이 되는 카드 두 장을 눌러봐!</p>
    <button class="bigbtn ghost" style="margin-top:12px" onclick="mtReset()">🔀 다시 섞기</button>
  </div>`;
}
function mtTap(i){
  const M=window._mt; if(!M||M.lock||M.done.has(i))return;
  const el=document.getElementById('mc'+i); if(!el)return;
  if(M.sel===i){ el.classList.remove('sel'); M.sel=-1; return; }
  el.classList.add('sel');
  if(M.sel<0){ M.sel=i; return; }
  const j=M.sel; M.sel=-1;
  if(M.cards[i].k===M.cards[j].k){
    M.done.add(i); M.done.add(j); sfx('ok');
    [i,j].forEach(x=>{const e=document.getElementById('mc'+x); e.classList.remove('sel'); e.classList.add('done');});
    if(M.done.size===M.cards.length){ confetti(false); sfx('win'); const m=document.getElementById('mt-msg'); if(m)m.textContent='다 찾았다! 🎉 다시 섞어서 또 해봐!'; }
  } else {
    M.lock=true; sfx('no');
    setTimeout(()=>{ [i,j].forEach(x=>{const e=document.getElementById('mc'+x); if(e)e.classList.remove('sel');}); M.lock=false; },650);
  }
}

function sgReset(){

function sgPick(b){
